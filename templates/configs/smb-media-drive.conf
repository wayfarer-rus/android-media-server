# Sanitized Samba example for Termux on Android.
# Replace 192.168.1.50, <usb-volume-id>, and <termux-android-uid>.
# Create a username map file at ~/samba/user.map containing:
#   <termux-android-uid> = media-home

[global]
   server string = Android Media Server
   workgroup = WORKGROUP
   security = user
   map to guest = never
   passdb backend = tdbsam
   smb ports = 1445
   bind interfaces only = yes
   interfaces = lo wlan0 192.168.1.50/24
   hosts allow = 127. 192.168.1.
   hosts deny = ALL
   server min protocol = SMB2_10
   server max protocol = SMB3_11
   username map = /data/data/com.termux/files/home/samba/user.map

[media-drive]
   path = /mnt/media_rw/<usb-volume-id>
   read only = no
   writable = yes
   guest ok = no
   browseable = yes
   valid users = media-home
   write list = media-home
   force user = <termux-android-uid>
